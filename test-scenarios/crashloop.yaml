apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: troubleshoot-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
        - name: crasher
          image: busybox:1.36
          command: ["sh", "-c", "echo 'config file /etc/app/config.yaml not found, exiting'; sleep 5; exit 1"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
