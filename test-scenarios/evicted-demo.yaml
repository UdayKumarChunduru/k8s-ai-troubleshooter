apiVersion: apps/v1
kind: Deployment
metadata:
  name: evicted-demo
  labels:
    app: evicted-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evicted-demo
  template:
    metadata:
      labels:
        app: evicted-demo
    spec:
      containers:
        - name: disk-filler
          image: busybox:1.36
          command: ["sh", "-c", "dd if=/dev/zero of=/scratch/fill bs=1M count=2000; sleep 3600"]
          volumeMounts:
            - name: scratch
              mountPath: /scratch
      volumes:
        - name: scratch
          emptyDir:
            sizeLimit: 100Mi
