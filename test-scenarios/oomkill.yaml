apiVersion: apps/v1
kind: Deployment
metadata:
  name: oomkill-demo
  namespace: troubleshoot-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oomkill-demo
  template:
    metadata:
      labels:
        app: oomkill-demo
    spec:
      containers:
        - name: hog
          image: polinux/stress
          command: ["stress"]
          args: ["--vm", "1", "--vm-bytes", "128M", "--vm-hang", "0"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
