{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-troubleshooter.secretName" . }}
  labels:
    {{- include "k8s-troubleshooter.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | default (randAlphaNum 32) | quote }}
  llm-api-key: {{ .Values.secrets.llmApiKey | quote }}
{{- end }}
