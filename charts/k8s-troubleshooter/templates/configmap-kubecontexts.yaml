{{- if .Values.kubecontexts.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-troubleshooter.fullname" . }}-kubecontexts
  labels:
    {{- include "k8s-troubleshooter.labels" . | nindent 4 }}
data:
  contexts.txt: |
    {{- range .Values.kubecontexts.contexts }}
    {{ . }}
    {{- end }}
{{- end }}
