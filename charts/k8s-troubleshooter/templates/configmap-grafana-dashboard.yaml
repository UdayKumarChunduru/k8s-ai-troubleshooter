{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-troubleshooter.fullname" . }}-grafana-dashboard
  labels:
    {{- include "k8s-troubleshooter.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  k8s-troubleshooter.json: |
{{ .Files.Get "files/grafana-dashboard.json" | indent 4 }}
{{- end }}
